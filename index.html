<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>外国人向け飲食店利用案内作成ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- 修正: Noto Sans TC (繁体字) を追加 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.js"></script>

    <style>
      body {
        /* フォントの優先順位を整理 */
        font-family: "Inter", "Noto Sans JP", "Noto Sans TC", "Noto Sans KR", sans-serif;
      }

      /* 言語ごとのフォント指定クラス */
      .lang-en { font-family: "Inter", sans-serif; }
      .lang-zh { font-family: "Noto Sans TC", sans-serif; }
      .lang-ko { font-family: "Noto Sans KR", sans-serif; }
      .lang-jp { font-family: "Noto Sans JP", sans-serif; }

      #preview-sheet {
        background-color: #f4f3ec;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        width: 100%;
        aspect-ratio: 210 / 297;
        position: relative;
        box-sizing: border-box;
      }

      #preview-header {
        padding: 0.75rem 1.5rem;
        border-bottom: 1px solid #e5e7eb;
        text-align: center;
        flex-shrink: 0;
        background-color: #363b5a; /* 背景画像がない場合のフォールバック */
        display: grid;
        grid-template-columns: 3rem auto;
        align-items: start;
        justify-content: center;
        gap: 1rem;
      }
      #preview-header h2 {
        font-size: 1.55rem;
        font-weight: 700;
        color: #ffffff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        line-height: 1.2;
      }

      #card-grid {
        flex-grow: 1;
        padding: 0.5rem 0.75rem 0.75rem;
        display: grid;
        gap: 0.5rem 0.75rem;
        overflow: hidden;
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: min-content;
      }

      .welcome-message-card {
        grid-column: span 2 / span 2;
        padding-inline: 0.75rem;
      }
      .welcome-message-card p {
        font-size: 1.05rem;
        line-height: 1.5; /* 重なり防止のため少し広げる */
        white-space: pre-wrap;
        letter-spacing: 0.02em;
      }

      .card-item, .payment-options-card {
        border: 2px solid #c5b37f;
        border-radius: 0.5rem;
        padding: 0.6rem 0.8rem 0.8rem;
        background-color: rgba(255, 255, 255, 0.95);
        display: flex;
        flex-direction: column;
      }

      .card-body {
        position: relative;
        z-index: 10;
        flex-grow: 1;
        font-size: 1rem;
        line-height: 1.5; /* 修正: 行間を広げて記号の重なりを防止 */
      }

      .title-wrap {
        display: grid;
        gap: 0.8rem;
        grid-template-columns: 3.5rem 1fr;
        align-items: start;
        margin-bottom: 0.4rem;
      }

      .title-wrap__title {
        color: #363b5a;
        line-height: 1.2 !important;
        font-size: 1.25rem;
      }

      .jp-text-sub {
        color: #6b7280;
        font-size: 0.7rem;
        margin-top: 0.4rem;
        line-height: 1.4;
        font-weight: normal;
        border-top: 1px dotted #e5e7eb;
        padding-top: 0.3rem;
      }

      .header-jp-sub {
        font-size: 0.6em;
        font-weight: normal;
        margin-left: 0.5rem;
      }

      #preview-footer {
        padding: 0.5rem 1.5rem 0.75rem 1.5rem;
        background-color: #363b5a;
        color: #ffffff;
        font-size: 0.6rem;
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.5); z-index: 9999;
        display: flex; justify-content: center; align-items: center;
        color: white; flex-direction: column;
      }
      #loader.hidden { display: none; }
      .spinner {
        border: 4px solid #f3f3f3; border-top: 4px solid #3498db;
        border-radius: 50%; width: 40px; height: 40px;
        animation: spin 2s linear infinite; margin-bottom: 1rem;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      .time-input {
        width: 3.5rem; text-align: center; border-radius: 0.25rem;
        border: 1px solid #d1d5db; padding: 0.1rem;
      }
      .brand-checkbox-container {
        margin-top: 0.5rem; display: none; flex-wrap: wrap; gap: 0.5rem;
      }
      .brand-checkbox-container.visible { display: flex; }
    </style>
  </head>
  <body class="bg-gray-100">
    <div id="loader" class="hidden">
      <div class="spinner"></div>
      <p>PDFを生成中です...</p>
    </div>

    <div id="survey-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-75 flex items-center justify-center p-4 z-50">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-3xl h-full max-h-[90vh] flex flex-col">
        <div class="p-4 border-b flex justify-between">
          <h3 class="text-lg font-medium text-gray-900">店舗情報の入力をお願いします</h3>
        </div>
        <div class="flex-grow p-1">
          <iframe id="google-form-iframe" src="https://forms.gle/NAPsSjZKjBF45Zc39" class="w-full h-full border-0"></iframe>
        </div>
        <div class="p-4 bg-gray-50 border-t flex justify-between items-center">
          <button id="skip-survey-button" class="px-4 py-2 bg-gray-200 text-gray-800 text-sm font-medium rounded-md hover:bg-gray-300">閉じる</button>
        </div>
      </div>
    </div>

    <div class="container mx-auto p-4 md:p-8">
      <header class="mb-8 flex justify-between items-center flex-wrap gap-4">
        <div>
          <h1 class="text-3xl font-bold text-gray-800">外国人向け飲食店利用案内作成ツール</h1>
          <p class="text-gray-600 mt-2">多言語の案内（啓発）を簡単作成・PDF出力</p>
        </div>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <aside id="control-panel" class="lg:col-span-1 bg-white p-6 rounded-lg shadow-md h-fit">
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">表示言語 (どれか1つ選択)</label>
            <div id="language-selection" class="space-y-2">
              <div class="flex items-center">
                <input id="lang-en" name="display-lang" value="en" type="radio" checked class="h-4 w-4 text-indigo-600 lang-radio" />
                <label for="lang-en" class="ml-2 text-sm text-gray-800">English (英語)</label>
              </div>
              <div class="flex items-center">
                <input id="lang-zh" name="display-lang" value="zh" type="radio" class="h-4 w-4 text-indigo-600 lang-radio" />
                <label for="lang-zh" class="ml-2 text-sm text-gray-800">中文 (中国語／繁体字)</label>
              </div>
              <div class="flex items-center">
                <input id="lang-ko" name="display-lang" value="ko" type="radio" class="h-4 w-4 text-indigo-600 lang-radio" />
                <label for="lang-ko" class="ml-2 text-sm text-gray-800">한국어 (韓国語)</label>
              </div>
            </div>
          </div>
          <div id="checklist-sections"></div>
        </aside>

        <div class="lg:col-span-2">
          <div id="preview-sheet-wrapper">
            <div id="preview-sheet">
              <header id="preview-header">
                <div class="preview-header-icon"></div>
                <h2 id="preview-title">Information for our Guests <span class="header-jp-sub">/ お客様へのお知らせ</span></h2>
              </header>
              <main id="card-grid"></main>
              <footer id="preview-footer">
                <div class="footer-text"></div>
                <div class="footer-logo-container"></div>
              </footer>
            </div>
            <div id="placeholder" class="text-center text-gray-500 py-16 bg-white rounded-lg shadow-md">項目を選択してください。</div>
          </div>

          <div id="pagination-controls" class="hidden mt-4 flex justify-center items-center">
            <button id="prev-page" class="px-4 py-2 text-sm bg-white border rounded hover:bg-gray-50 disabled:opacity-50">前へ</button>
            <span id="page-info" class="mx-4 text-sm text-gray-600"></span>
            <button id="next-page" class="px-4 py-2 text-sm bg-white border rounded hover:bg-gray-50 disabled:opacity-50">次へ</button>
          </div>

          <div class="mt-8 text-right">
            <button id="pdf-download-button" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
              PDFをダウンロード
            </button>
          </div>
        </div>
      </main>
    </div>

    <script>
      const MAX_CELLS_PAGE1 = 8;
      const MAX_CELLS_NORMAL = 10;
      let currentPage = 1;

      const headerTitleData = {
        en: "Information for our Guests",
        zh: "顧客須知",
        ko: "고객님께 드리는 알림",
        jp: "お客様へのお知らせ",
      };

      const welcomeMessageData = {
        en: { title: "Before the Meal", description: "Thank you for coming today. To ensure a pleasant meal, please read the following. We appreciate your understanding." },
        zh: { title: "用餐之前", description: "感謝您蒞臨本店。為了讓您有良好的用餐体験，請務必詳讀下列事項。感謝您的理解與協助。" },
        ko: { title: "식사 전에", description: "저희 매장을 방문해 주셔서 감사합니다. 즐겁게 식사하실 수 있도록 아래 사항에 대해 미리 고객님의 양해를 부탁드립니다." },
        jp: { title: "お食事の前に", description: "ご来店ありがとうございます。楽しくお食事を楽しんでいただくために、以下の事項について予めご了承いただきますよう、お願いいたします。" },
      };

      const footerData = {
        en: { note: "■ Information may change. Please ask our staff.", credit: "■ Created using Ishikawa Prefecture services." },
        zh: { note: "■ 刊載内容可能會有所變更。如有疑問，請洽詢店員。", credit: "■ 本指南是使用石川縣提供的服務製作。" },
        ko: { note: "■ 게재 내용은 변경될 수 있습니다. 직원에게 문의해 주세요.", credit: "■ 이시카와현의 서비스를 사용하여 작성되었습니다." },
        jp: { note: "掲載内容は変更になる場合がございます。スタッフまでお尋ねください。", credit: "石川県提供サービスにて作成。" },
      };

      const phrasesData = {
        payment: {
          title: "会計関連",
          items: {
            payment_options: {
              jp_label: "会計対応（現金・カード等）",
              svgPath: "", hasCustomUI: true,
              content: {
                en: { title: "Payment Methods", description: "We accept the following payment method(s)." },
                zh: { title: "付款方式", description: "提供以下結帳方式。詳情請詢問店內人員。" },
                ko: { title: "지불 방법", description: "결제는 아래와 같은 방법으로 대응하고 있습니다." },
              },
              options_text: {
                en: { yes: "Yes", no: "No", cash: "Cash", card: "Credit Card", ic: "Transit IC" },
                zh: { yes: "可", no: "不可", cash: "現金", card: "信用卡", ic: "交通IC卡" },
                ko: { yes: "가능", no: "불가능", cash: "현금", card: "카드", ic: "교통IC" },
                jp: { yes: "可", no: "不可", cash: "現金", card: "カード", ic: "交通系IC" },
              },
            },
            no_split_bill_new: {
              jp_label: "会計はまとめてお願いします。",
              content: {
                en: { title: "No Separate Payments", description: "Please pay for the entire party together." },
                zh: { title: "結帳僅限一次付清", description: "請以團體為単位結帳。" },
                ko: { title: "합산 계산 부탁", description: "계산은 한번에 지불하시도록 부탁드립니다." },
              }
            }
          }
        },
        food: {
          title: "食事・メニュー関連",
          items: {
            otoshi_charge: {
              jp_label: 'お席料として「お通し」をお出しします。居酒屋文化の慣習です。',
              content: {
                en: { title: 'O-Toshi (Appetizer)', description: "This restaurant serves o-toshi, a small appetizer included in the seating charge." },
                zh: { title: "關於開胃小菜", description: "我們將提供「開胃小菜」作為座位費用。這是日本居酒屋文化常見的習慣。" },
                ko: { title: "오토시에 대하여", description: "자리 비용으로 “오토시(기본 안주)”가 나옵니다." },
              }
            },
            market_price_new: {
              jp_label: '一部商品は「時価」です。価格は仕入れで変動します。',
              content: {
                en: { title: 'Market Price', description: "Some menu items are “market price” based on the day's fresh seafood supply." },
                zh: { title: "關於時價", description: "部分商品採用「時價」計價。採用「時價」的商品，會隨著進貨成本而波動。" },
                ko: { title: "시가에 대하여", description: "일부 상품은 “시가”입니다. 구입 가격에 따라 변동됩니다." },
              }
            },
            no_take_away_new: {
              jp_label: "食べ残しのお持ち帰りはご遠慮ください。",
              content: {
                en: { title: "No Take-Out", description: "We do not offer take-out for leftover food." },
                // 修正: 「将」を繁体字の「將」に変更
                zh: { title: "餐點請勿打包外帶", description: "請勿將吃剩的食物打包帶走。" },
                ko: { title: "포장 불가", description: "남은 음식은 포장이 불가능합니다." },
              }
            }
          }
        },
        manners: {
          title: "マナー・行動関連",
          items: {
            seat_time_limit_fixed: {
              hasInput: true,
              jp_label: 'お席は[時間]時間制とさせていただきます。',
              content: {
                en: { title: "Seating Time Limit", description: "We ask that guests stay no longer than {time} hours." },
                zh: { title: "座位使用時間", description: "用餐時間限制為 {time} 小時。" },
                ko: { title: "이용 시간 제한", description: "자리 이용은 {time}시간으로 제한하고 있습니다." },
              }
            }
          }
        }
      };

      function getLangClass(lang) {
        return `lang-${lang}`;
      }

      function createChecklist() {
        const container = document.getElementById("checklist-sections");
        container.innerHTML = Object.entries(phrasesData).map(([secKey, section]) => {
          const itemsHtml = Object.entries(section.items).map(([key, item]) => {
            return `
              <div class="relative flex items-start mb-2">
                <div class="flex h-6 items-center"><input id="${key}" type="checkbox" class="h-4 w-4 rounded text-indigo-600 checkbox-item"></div>
                <div class="ml-3 text-sm"><label for="${key}" class="font-medium text-gray-900">${item.jp_label}</label></div>
              </div>
              ${key === 'payment_options' ? `
                <div class="ml-6 mb-4 space-y-2 text-xs">
                  <div>現金: <input type="radio" name="pay_cash" value="yes" checked> 可 <input type="radio" name="pay_cash" value="no"> 不可</div>
                  <div>カード: <input type="radio" name="pay_card" value="yes" checked> 可 <input type="radio" name="pay_card" value="no"> 不可</div>
                </div>` : ''}
              ${item.hasInput ? `<div class="ml-6 mb-4"><input type="number" id="${key}-input" class="time-input" value="2" step="0.5"> 時間</div>` : ''}
            `;
          }).join("");
          return `<div class="mb-6"><h3 class="font-bold border-b pb-1 mb-2">${section.title}</h3>${itemsHtml}</div>`;
        }).join("");

        document.querySelectorAll("input").forEach(input => {
          input.addEventListener("change", renderPreview);
          if(input.type === "number") input.addEventListener("input", renderPreview);
        });
      }

      function renderPreview() {
        const selectedLang = document.querySelector(".lang-radio:checked").value;
        const checkedKeys = Array.from(document.querySelectorAll(".checkbox-item:checked")).map(i => i.id);
        const cardGrid = document.getElementById("card-grid");
        
        if (checkedKeys.length === 0) {
          document.getElementById("placeholder").style.display = "block";
          document.getElementById("preview-sheet").style.display = "none";
          return;
        }

        document.getElementById("placeholder").style.display = "none";
        document.getElementById("preview-sheet").style.display = "flex";
        document.getElementById("preview-title").innerHTML = `${headerTitleData[selectedLang]} <span class="header-jp-sub">/ ${headerTitleData.jp}</span>`;

        cardGrid.innerHTML = "";
        
        // Welcome Message (Page 1)
        if (currentPage === 1) {
          const welcome = welcomeMessageData[selectedLang];
          cardGrid.innerHTML += `
            <div class="welcome-message-card ${getLangClass(selectedLang)}" lang="${selectedLang}">
              <p class="font-bold mb-1">${welcome.title}</p>
              <p>${welcome.description}</p>
              <div class="jp-text-sub lang-jp" lang="ja">${welcomeMessageData.jp.description}</div>
            </div>`;
        }

        checkedKeys.forEach(key => {
          const item = findItem(key);
          if (!item) return;

          const content = item.content[selectedLang];
          let desc = content.description;
          let jpDesc = item.jp_label;

          if (item.hasInput) {
            const val = document.getElementById(`${key}-input`).value;
            desc = desc.replace("{time}", val);
            jpDesc = jpDesc.replace("[時間]", val);
          }

          let extraHtml = "";
          if (key === 'payment_options') {
            const cash = document.querySelector('input[name="pay_cash"]:checked').value;
            const card = document.querySelector('input[name="pay_card"]:checked').value;
            const texts = item.options_text[selectedLang];
            const jpTexts = item.options_text.jp;
            extraHtml = `
              <div class="mt-2 text-sm flex gap-4">
                <span>${texts.cash}: <strong>${texts[cash]}</strong></span>
                <span>${texts.card}: <strong>${texts[card]}</strong></span>
              </div>
              <div class="jp-text-sub text-[0.6rem] lang-jp" lang="ja">
                ${jpTexts.cash}: ${jpTexts[cash]} / ${jpTexts.card}: ${jpTexts[card]}
              </div>`;
          }

          cardGrid.innerHTML += `
            <div class="card-item">
              <div class="card-body ${getLangClass(selectedLang)}" lang="${selectedLang}">
                <p class="font-bold text-lg mb-1">${content.title}</p>
                <p>${desc}</p>
                ${extraHtml}
                ${key !== 'payment_options' ? `<div class="jp-text-sub lang-jp" lang="ja">${jpDesc}</div>` : ''}
              </div>
            </div>`;
        });

        // Footer
        const foot = footerData[selectedLang];
        document.querySelector(".footer-text").innerHTML = `
          <div class="${getLangClass(selectedLang)}" lang="${selectedLang}">
            <p>${foot.note}</p><p>${foot.credit}</p>
          </div>
          <div class="jp-text-sub lang-jp" lang="ja" style="border:none; color:white; opacity:0.7;">
            <p>${footerData.jp.note}</p><p>${footerData.jp.credit}</p>
          </div>`;
      }

      function findItem(key) {
        for (const sec of Object.values(phrasesData)) {
          if (sec.items[key]) return sec.items[key];
        }
        return null;
      }

      async function generatePDF() {
        const loader = document.getElementById("loader");
        loader.classList.remove("hidden");
        const { jsPDF } = window.jspdf;
        const sheet = document.getElementById("preview-sheet");
        
        try {
          const canvas = await html2canvas(sheet, { scale: 2, useCORS: true });
          const imgData = canvas.toDataURL("image/jpeg", 0.9);
          const pdf = new jsPDF("p", "mm", "a4");
          pdf.addImage(imgData, "JPEG", 0, 0, 210, 297);
          pdf.save("notice.pdf");
        } catch (e) {
          console.error(e);
        } finally {
          loader.classList.add("hidden");
        }
      }

      document.getElementById("pdf-download-button").addEventListener("click", generatePDF);
      document.getElementById("skip-survey-button").addEventListener("click", () => {
        document.getElementById("survey-modal").classList.add("hidden");
      });

      document.addEventListener("DOMContentLoaded", () => {
        createChecklist();
        renderPreview();
      });
    </script>
  </body>
</html>
